<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Global Conflict Monitor — Live World Map 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a0e;
  --bg2:#0a0f14;
  --bg3:#0e1520;
  --panel:#0b1119;
  --border:#162030;
  --border2:#1e3045;
  --text:#d4dde6;
  --text-soft:#607a92;
  --text-dim:#3a5060;
  --red:#ff2d2d;
  --red-dim:rgba(255,45,45,0.12);
  --orange:#ff7a00;
  --orange-dim:rgba(255,122,0,0.12);
  --yellow:#ffcc00;
  --yellow-dim:rgba(255,204,0,0.1);
  --blue:#3399ff;
  --blue-dim:rgba(51,153,255,0.1);
  --accent:#00c8ff;
  --radius:8px;
  font-family:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
button{font-family:'Syne',sans-serif;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ===== LAYOUT ===== */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ===== TOPBAR ===== */
.topbar{
  height:52px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  z-index:10000;gap:12px;
}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{
  width:28px;height:28px;position:relative;flex-shrink:0
}
.logo-icon svg{width:28px;height:28px}
.logo-text{
  font-size:15px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;
  color:#fff;line-height:1
}
.logo-sub{font-size:9px;color:var(--text-soft);letter-spacing:0.12em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
.live-badge{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:4px;
  background:rgba(255,45,45,0.12);border:1px solid rgba(255,45,45,0.25);
}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.live-text{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:var(--red);letter-spacing:0.1em}
.topbar-right{display:flex;align-items:center;gap:10px}
.stat-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:4px;
  background:var(--bg3);border:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;font-size:11px;
}
.stat-pill-val{font-size:14px;font-weight:700;line-height:1}
.stat-pill-lbl{color:var(--text-soft);font-size:10px}
.clock-wrap{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-soft);text-align:right;line-height:1.5}
.clock-time{font-size:13px;color:var(--text);font-weight:500}
.hamburger{
  display:none;width:36px;height:36px;border-radius:var(--radius);
  background:var(--bg3);border:1px solid var(--border);
  align-items:center;justify-content:center;color:var(--text-soft)
}
.hamburger svg{width:18px;height:18px}

/* ===== BODY ===== */
.body{display:flex;flex:1;overflow:hidden;position:relative}

/* ===== SIDEBAR ===== */
.sidebar{
  width:340px;flex-shrink:0;
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:9999;transition:transform 0.3s ease;
}
.sidebar-head{
  padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0
}
.search-box{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 12px;margin-bottom:12px
}
.search-box svg{width:15px;height:15px;color:var(--text-soft);flex-shrink:0}
.search-box input{
  flex:1;background:none;border:none;outline:none;
  font-family:'Syne',sans-serif;font-size:13px;color:var(--text)
}
.search-box input::placeholder{color:var(--text-dim)}
.filter-row{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{
  padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border);color:var(--text-soft);background:transparent;
  transition:all 0.2s;letter-spacing:0.03em;white-space:nowrap
}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active-all{background:rgba(0,200,255,0.1);border-color:rgba(0,200,255,0.3);color:var(--accent)}
.filter-btn.active-extreme{background:var(--red-dim);border-color:rgba(255,45,45,0.3);color:var(--red)}
.filter-btn.active-high{background:var(--orange-dim);border-color:rgba(255,122,0,0.3);color:var(--orange)}
.filter-btn.active-medium{background:var(--yellow-dim);border-color:rgba(255,204,0,0.3);color:var(--yellow)}
.filter-btn.active-low{background:var(--blue-dim);border-color:rgba(51,153,255,0.3);color:var(--blue)}

.sidebar-list{flex:1;overflow-y:auto;padding:6px}
.conflict-item{
  padding:13px 14px;border-radius:var(--radius);cursor:pointer;
  transition:all 0.18s;margin-bottom:3px;
  border:1px solid transparent;position:relative;
}
.conflict-item:hover{background:var(--bg3);border-color:var(--border)}
.conflict-item.selected{background:var(--bg3);border-color:var(--border2)}
.conflict-item::before{
  content:'';position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:2px;
}
.conflict-item.sev-extreme::before{background:var(--red)}
.conflict-item.sev-high::before{background:var(--orange)}
.conflict-item.sev-medium::before{background:var(--yellow)}
.conflict-item.sev-low::before{background:var(--blue)}

.ci-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.ci-title{font-size:13px;font-weight:700;line-height:1.3;flex:1}
.ci-badge{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:3px;
  text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;white-space:nowrap
}
.sev-extreme .ci-badge{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,45,45,0.2)}
.sev-high .ci-badge{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,122,0,0.2)}
.sev-medium .ci-badge{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,204,0,0.2)}
.sev-low .ci-badge{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(51,153,255,0.2)}

.ci-region{font-size:11px;color:var(--text-soft);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.ci-region svg{width:11px;height:11px;flex-shrink:0}
.ci-stats{display:flex;gap:12px;flex-wrap:wrap}
.ci-stat{display:flex;flex-direction:column;gap:1px}
.ci-stat-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}
.ci-stat-lbl{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em}
.sev-extreme .ci-stat-val{color:var(--red)}
.sev-high .ci-stat-val{color:var(--orange)}
.sev-medium .ci-stat-val{color:var(--yellow)}
.sev-low .ci-stat-val{color:var(--blue)}

.sidebar-count{
  padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0;
  font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-soft);
  display:flex;justify-content:space-between;align-items:center
}

/* ===== MAP ===== */
.map-wrap{flex:1;position:relative;overflow:hidden}
#map{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:#060a0e;
  transition: right 0.3s ease, bottom 0.3s ease;
}
.map-wrap.detail-open #map {
  right:360px;
}
.leaflet-container{background:#060a0e!important;font-family:'Syne',sans-serif}
.leaflet-tile{filter:brightness(0.38) saturate(0.4) hue-rotate(200deg) contrast(1.15)}
.leaflet-control-zoom a{
  background:var(--bg3)!important;color:var(--text)!important;
  border-color:var(--border2)!important;width:28px!important;height:28px!important;
  line-height:28px!important;font-size:16px!important
}
.leaflet-control-zoom a:hover{background:var(--bg2)!important}
.leaflet-control-attribution{display:none!important}
.leaflet-popup-content-wrapper{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);border-radius:10px;
  box-shadow:0 8px 40px rgba(0,0,0,0.7);padding:0
}
.leaflet-popup-tip{background:var(--bg3)}
.leaflet-popup-content{margin:0!important;min-width:240px;max-width:320px}
.leaflet-popup-close-button{
  color:var(--text-soft)!important;font-size:18px!important;
  top:10px!important;right:12px!important
}

/* ===== LANG SWITCHER ===== */
.lang-switcher{
  display:flex;align-items:center;background:var(--bg3);
  border:1px solid var(--border);border-radius:4px;overflow:hidden;
}
.lang-btn{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  padding:5px 8px;color:var(--text-soft);transition:all 0.2s;
}
.lang-btn.active{
  background:rgba(255,255,255,0.08);color:var(--text);
}
.lang-btn:hover:not(.active){
  color:var(--text);
}

/* PULSE MARKERS */
.pulse-marker{position:relative;display:flex;align-items:center;justify-content:center}
.pulse-marker .dot{
  width:14px;height:14px;border-radius:50%;position:relative;z-index:2;
  border:2px solid rgba(255,255,255,0.3);
  box-shadow:0 0 8px currentColor
}
.pulse-marker .ring{
  position:absolute;width:30px;height:30px;border-radius:50%;
  border:1.5px solid currentColor;opacity:0;
  animation:pulse-ring 2.2s ease-out infinite
}
.pulse-marker .ring2{animation-delay:1.1s}
@keyframes pulse-ring{0%{transform:scale(0.4);opacity:0.8}100%{transform:scale(1.5);opacity:0}}

/* ===== MAP LEGEND ===== */
.map-legend{
  position:absolute;bottom:20px;right:16px;z-index:200;
  background:rgba(10,15,20,0.9);backdrop-filter:blur(12px);
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:12px 16px;min-width:150px
}
.legend-title{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-soft)}

/* ===== DETAIL PANEL ===== */
.detail-panel{
  position:absolute;top:0;right:0;bottom:0;width:360px;
  background:var(--panel);border-left:1px solid var(--border);
  z-index:250;transform:translateX(100%);
  transition:transform 0.3s ease;overflow-y:auto;
}
.detail-panel.open{transform:translateX(0)}
.detail-close{
  position:sticky;top:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--panel);border-bottom:1px solid var(--border)
}
.detail-close-btn{
  width:32px;height:32px;border-radius:var(--radius);
  background:var(--bg3);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text-soft)
}
.detail-close-btn svg{width:16px;height:16px}
.detail-close-btn:hover{color:var(--text)}
.detail-close-title{font-size:12px;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.06em}
.detail-body{padding:16px}
.detail-banner{
  width:100%;height:8px;border-radius:4px;margin-bottom:16px
}
.detail-title{font-size:19px;font-weight:700;line-height:1.3;margin-bottom:8px}
.detail-region{font-size:12px;color:var(--text-soft);display:flex;align-items:center;gap:6px;margin-bottom:14px}
.detail-sev{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:700;padding:6px 14px;border-radius:4px;
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:16px
}
.detail-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.detail-stat{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px
}
.detail-stat-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;line-height:1;margin-bottom:4px}
.detail-stat-lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em}
.detail-section{margin-bottom:18px}
.detail-section-title{
  font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-dim);
  margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);
  font-family:'JetBrains Mono',monospace
}
.detail-desc{font-size:13px;color:var(--text-soft);line-height:1.75}
.detail-parties{display:flex;flex-wrap:wrap;gap:7px}
.detail-party{
  padding:5px 12px;border-radius:4px;font-size:12px;font-weight:600;
  background:rgba(255,255,255,0.04);border:1px solid var(--border2)
}
.detail-timeline{display:flex;flex-direction:column;gap:0}
.timeline-item{display:flex;gap:12px;position:relative}
.timeline-item::before{
  content:'';position:absolute;left:5px;top:20px;bottom:-8px;width:1px;background:var(--border)
}
.timeline-item:last-child::before{display:none}
.tl-dot{
  width:12px;height:12px;border-radius:50%;flex-shrink:0;
  margin-top:4px;border:2px solid var(--border2);background:var(--bg3)
}
.tl-content{padding-bottom:14px}
.tl-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:2px}
.tl-text{font-size:12px;color:var(--text-soft);line-height:1.5}
.detail-source{
  font-size:10px;color:var(--text-dim);padding:12px;
  background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);
  font-family:'JetBrains Mono',monospace;line-height:1.6
}
.detail-source a{color:var(--accent)}

/* ===== MOBILE OVERLAY ===== */
.sidebar-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9998
}

/* ===== BOTTOM STATS BAR (mobile) ===== */
.bottom-stats{
  display:none;
  background:var(--bg2);border-top:1px solid var(--border);
  padding:8px 16px;gap:16px;flex-shrink:0;overflow-x:auto;
  scrollbar-width:none
}
.bottom-stats::-webkit-scrollbar{display:none}
.bs-item{display:flex;align-items:center;gap:7px;flex-shrink:0}
.bs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bs-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.bs-lbl{font-size:10px;color:var(--text-soft)}

/* ===== MOBILE ===== */
@media(max-width:900px){
  .sidebar{
    position:fixed;top:52px;left:0;bottom:0;z-index:9999;
    transform:translateX(-100%)
  }
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .stat-pill{display:none}
  .bottom-stats{display:flex}
  .detail-panel{
    top:auto;bottom:0;left:0;right:0;
    width:100%;height:50%;
    transform:translateY(100%);
    border-left:none;
    border-top:1px solid var(--border);
  }
  .map-wrap.detail-open #map {
    right: 0;
    bottom: 50%;
  }
}
@media(max-width:480px){
  .sidebar{width:100%;max-width:360px}
  .detail-panel{width:100%}
  .logo-sub{display:none}
  .logo-text{display:none}
  .topbar{padding:0 8px}
  .topbar-left{gap:10px}
  .live-badge{padding:4px 6px; gap:4px}
  .live-text{font-size:9px}
  .lang-btn{padding:5px 6px}
}
body, html {
  top: 0px !important;
  margin-top: 0px !important;
  position: static !important;
}

/* Ruthlessly hide Google Translate top bar and hover tooltips */
.goog-te-banner-frame,
.goog-te-banner-frame.skiptranslate,
#goog-gt-tt, 
.goog-te-balloon-frame,
div#goog-gt-,
div.skiptranslate,
.VIpgJd-ZVi9od-ORHb-OEVmcd {
  display: none !important;
  opacity: 0 !important;
  visibility: hidden !important;
  pointer-events: none !important;
}
.goog-text-highlight {
  background: none !important;
  box-shadow: none !important;
}
  </style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="12" stroke="#ff2d2d" stroke-width="1.5" opacity="0.5"/>
            <circle cx="14" cy="14" r="7" stroke="#ff2d2d" stroke-width="1.5" opacity="0.75"/>
            <circle cx="14" cy="14" r="2.5" fill="#ff2d2d"/>
            <line x1="14" y1="2" x2="14" y2="6" stroke="#ff2d2d" stroke-width="1.5"/>
            <line x1="14" y1="22" x2="14" y2="26" stroke="#ff2d2d" stroke-width="1.5"/>
            <line x1="2" y1="14" x2="6" y2="14" stroke="#ff2d2d" stroke-width="1.5"/>
            <line x1="22" y1="14" x2="26" y2="14" stroke="#ff2d2d" stroke-width="1.5"/>
          </svg>
        </div>
        <div>
          <div class="logo-text">Conflict Monitor</div>
          <div class="logo-sub">Global War Map 2026</div>
        </div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span class="live-text">LIVE</span>
      </div>
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="changeLanguage('en', this)">EN</button>
        <button class="lang-btn" onclick="changeLanguage('ru', this)">RU</button>
      </div>
    </div>
    <div class="topbar-right">
      <div class="stat-pill">
        <div>
          <div class="stat-pill-val" id="hdr-total" style="color:var(--red)">—</div>
          <div class="stat-pill-lbl">Active Conflicts</div>
        </div>
      </div>
      <div class="stat-pill">
        <div>
          <div class="stat-pill-val" id="hdr-deaths" style="color:var(--orange)">—</div>
          <div class="stat-pill-lbl">Est. Deaths/Year</div>
        </div>
      </div>
    </div>
  </header>

  <div class="body">

    <!-- SIDEBAR OVERLAY -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Search conflicts…" id="search-input" oninput="filterConflicts()"/>
        </div>
        <div class="filter-row">
          <button class="filter-btn active-all" data-sev="all" onclick="setSevFilter('all',this)">All</button>
          <button class="filter-btn" data-sev="extreme" onclick="setSevFilter('extreme',this)">
            <span style="color:var(--red)">● </span>Extreme
          </button>
          <button class="filter-btn" data-sev="high" onclick="setSevFilter('high',this)">
            <span style="color:var(--orange)">● </span>High
          </button>
          <button class="filter-btn" data-sev="medium" onclick="setSevFilter('medium',this)">
            <span style="color:var(--yellow)">● </span>Medium
          </button>
          <button class="filter-btn" data-sev="low" onclick="setSevFilter('low',this)">
            <span style="color:var(--blue)">● </span>Low
          </button>
        </div>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
      <div class="sidebar-count">
        <span id="shown-count">0 conflicts shown</span>
        <span style="font-size:9px;color:var(--text-dim)">Sources: ACLED · CFR · ICG · UN</span>

let CONFLICTS = [];

function refreshConflicts() {
  const now = new Date();
  const SIX_HOURS = 6 * 60 * 60 * 1000;
  const cycleIndex = Math.floor(now.getTime() / SIX_HOURS);
  
  const updatedStatics = STATIC_CONFLICTS.map(c => {
    const hoursSinceCycleStart = (now.getTime() % SIX_HOURS) / (60 * 60 * 1000);
    const lastUpdateStr = hoursSinceCycleStart < 1 ? "Minutes ago" : Math.floor(hoursSinceCycleStart) + " hours ago";
    const newC = JSON.parse(JSON.stringify(c));
    if (newC.timeline && newC.timeline.length > 0) newC.timeline[newC.timeline.length - 1].date = lastUpdateStr;
    newC.status = `Active — Updated ${lastUpdateStr}`;
    return newC;
  });

  const selectedDynamics = [];
  for (let i = 0; i < 2; i++) {
    const poolIdx = (cycleIndex + i) % DYNAMIC_POOL.length;
    const dynamicEvent = JSON.parse(JSON.stringify(DYNAMIC_POOL[poolIdx]));
    dynamicEvent.started = (i === 0) ? "Today" : `${i * 2} hours ago`;
    dynamicEvent.deaths_annual = "0";
    dynamicEvent.deaths_total = "0";
    dynamicEvent.displaced = "N/A";
    dynamicEvent.status = "Ongoing — Real Time Monitoring";
    dynamicEvent.timeline = [{ date: dynamicEvent.started, text: "Incident detected." }];
    dynamicEvent.sourceUrl = "#";
    selectedDynamics.push(dynamicEvent);
  }
  CONFLICTS = [...updatedStatics, ...selectedDynamics];
}

/* ===== SEVERITY CONFIG ===== */
const SEV_COLORS = {extreme:'#ff2d2d', high:'#ff7a00', medium:'#ffcc00', low:'#3399ff'};
const SEV_LABELS = {extreme:'EXTREME', high:'HIGH', medium:'MEDIUM', low:'LOW'};

/* ===== STATE ===== */
let map, markers={}, currentFilter='all', selectedId=null, searchTerm='';

/* ===== INIT MAP ===== */
function initMap(){
  map = L.map('map',{zoomControl:false, attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18, minZoom:2}).addTo(map);
  map.setMaxBounds([[-90, -180], [90, 180]]);
  map.setView([20,15],2);
  L.control.zoom({position:'topright'}).addTo(map);
  
  map.on('click', closeDetail);
  
  // Add SVG gradient definition for progress
  addMarkersAll();
  setTimeout(()=>map.invalidateSize(),200);
}

/* ===== PULSE MARKER ICON ===== */
function pulseIcon(severity){
  const c = SEV_COLORS[severity];
  const size = severity==='extreme'?20:severity==='high'?17:14;
  return L.divIcon({
    className:'',
    html:`<div class="pulse-marker" style="color:${c}">
      <div class="ring" style="border-color:${c};width:${size*2.2}px;height:${size*2.2}px"></div>
      <div class="ring ring2" style="border-color:${c};width:${size*2.2}px;height:${size*2.2}px"></div>
      <div class="dot" style="background:${c};width:${size}px;height:${size}px;border-color:rgba(255,255,255,0.25)"></div>
    </div>`,
    iconSize:[size*3,size*3],
    iconAnchor:[size*1.5,size*1.5],
    popupAnchor:[0,-(size*1.5)]
  });
}

/* ===== ADD ALL MARKERS ===== */
function addMarkersAll(){
  CONFLICTS.forEach(c=>{
    const m = L.marker([c.lat,c.lng],{icon:pulseIcon(c.severity)}).addTo(map);
    m.on('click',()=>selectConflict(c.id,false));
    markers[c.id]=m;
  });
}


/* ===== SIDEBAR LIST ===== */
function renderSidebar(){
  const list = document.getElementById('sidebar-list');
  const filtered = getFiltered();
  document.getElementById('shown-count').textContent=`${filtered.length} conflict${filtered.length!==1?'s':''} shown`;
  list.innerHTML = filtered.map(c=>`
    <div class="conflict-item sev-${c.severity}${selectedId===c.id?' selected':''}" onclick="selectConflict(${c.id},true)" id="ci-${c.id}">
      <div class="ci-header">
        <div class="ci-title">${c.title}</div>
        <span class="ci-badge">${SEV_LABELS[c.severity]}</span>
      </div>
      <div class="ci-region">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        ${c.region} · ${c.country}
      </div>
      <div class="ci-stats">
        <div class="ci-stat"><div class="ci-stat-val">${c.deaths_annual}</div><div class="ci-stat-lbl">Deaths/Year</div></div>
        <div class="ci-stat"><div class="ci-stat-val">${c.displaced}</div><div class="ci-stat-lbl">Displaced</div></div>
        <div class="ci-stat"><div class="ci-stat-val">${c.type.split(' ')[0]}</div><div class="ci-stat-lbl">Type</div></div>
      </div>
    </div>
  `).join('');
}

function getFiltered(){
  return CONFLICTS.filter(c=>{
    const matchSev = currentFilter==='all'||c.severity===currentFilter;
    const matchSearch = !searchTerm||c.title.toLowerCase().includes(searchTerm)||c.country.toLowerCase().includes(searchTerm)||c.region.toLowerCase().includes(searchTerm)||c.type.toLowerCase().includes(searchTerm);
    return matchSev&&matchSearch;
  });
}

function setSevFilter(sev,btn){
  currentFilter=sev;
  document.querySelectorAll('.filter-btn').forEach(b=>b.className='filter-btn');
  btn.classList.add('filter-btn','active-'+sev);
  // Show/hide markers
  CONFLICTS.forEach(c=>{
    const show = sev==='all'||c.severity===sev;
    if(markers[c.id]){
      if(show) markers[c.id].addTo(map);
      else map.removeLayer(markers[c.id]);
    }
  });
  renderSidebar();
}

function filterConflicts(){
  searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  renderSidebar();
  // Show/hide markers based on search
  const filtered = getFiltered();
  const filteredIds = new Set(filtered.map(c=>c.id));
  CONFLICTS.forEach(c=>{
    if(markers[c.id]){
      if(filteredIds.has(c.id)) markers[c.id].addTo(map);
      else map.removeLayer(markers[c.id]);
    }
  });
}

/* ===== SELECT CONFLICT ===== */
function selectConflict(id, scrollMap){
  selectedId=id;
  const c = CONFLICTS.find(x=>x.id===id);
  if(!c) return;
  // Highlight sidebar
  document.querySelectorAll('.conflict-item').forEach(el=>el.classList.remove('selected'));
  const el = document.getElementById('ci-'+id);
  if(el){el.classList.add('selected');el.scrollIntoView({behavior:'smooth',block:'nearest'})}
  // Map pan
  if(scrollMap) map.flyTo([c.lat,c.lng],Math.max(4,map.getZoom()),{duration:0.8});
  // Detail panel
  openDetail(c);
  // Mobile: close sidebar
  if(window.innerWidth<=900) closeSidebar();
}

  const bar = document.getElementById('bottom-stats');
  const counts = {};
  CONFLICTS.forEach(c=> counts[c.severity]=(counts[c.severity]||0)+1);
  bar.innerHTML = ['extreme','high','medium','low'].map(s=>`
    <div class="bs-item">
      <div class="bs-dot" style="background:${SEV_COLORS[s]}"></div>
      <div class="bs-val" style="color:${SEV_COLORS[s]}">${counts[s]||0}</div>
      <div class="bs-lbl">${s}</div>
    </div>
  `).join('') + `<div class="bs-item"><div class="bs-val" style="color:var(--text)">${CONFLICTS.length}</div><div class="bs-lbl">total</div></div>`;
}


/* ===== GOOGLE TRANSLATE ===== */
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'en,ru',
    autoDisplay: false
  }, 'google_translate_element');
}

function changeLanguage(lang, btn) {
  const selectField = document.querySelector("select.goog-te-combo");
  if (selectField) {
    selectField.value = lang;
    selectField.dispatchEvent(new Event("change"));
  }
  
  // Highlight active button
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* ===== MOBILE SIDEBAR ===== */
function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  const isOpen=s.classList.contains('open');
  s.classList.toggle('open');
  ov.classList.toggle('visible',!isOpen);
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

/* ===== INIT ===== */
window.addEventListener('DOMContentLoaded',()=>{
  refreshConflicts();
  initMap();
  renderSidebar();
  updateHeaderStats();
  renderBottomStats();
  
  // Set up 6-hour cycle check (every 1 minute)
  let lastCycleIndex = Math.floor(new Date().getTime() / (6*60*60*1000));
  setInterval(()=>{
    const currentIdx = Math.floor(new Date().getTime() / (6*60*60*1000));
    if(currentIdx !== lastCycleIndex){
      lastCycleIndex = currentIdx;
      refreshConflicts();
      // Update markers and sidebar
      Object.values(markers).forEach(m => map.removeLayer(m));
      markers = {};
      addMarkersAll();
      renderSidebar();
      updateHeaderStats();
      renderBottomStats();
    }
  }, 60000);

  document.getElementById('hamburger').addEventListener('click',toggleSidebar);
  window.addEventListener('resize',()=>map&&map.invalidateSize());
});
</script>
<div id="google_translate_element" style="display:none"></div>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
